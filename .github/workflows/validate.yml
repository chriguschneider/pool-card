name: Validate

# HACS plugin validation requires a published GitHub release, so this
# runs at release time (and on demand), not on every push — otherwise
# main would be red until the first release (tracked in #11).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: plugin
